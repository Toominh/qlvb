function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

/* Phát hiện GitHub Pages và trả về {owner, repo} hoặc null */
function detectGitHub(){
  const host=window.location.hostname;
  if(!host.endsWith('.github.io'))return null;
  const owner=host.replace('.github.io','');
  const parts=window.location.pathname.split('/').filter(Boolean);
  const repo=parts.length ? parts[0] : owner+'.github.io';
  return {owner,repo};
}

async function openLoadModal(){
  document.getElementById('loadModal').classList.add('on');
  await refreshLoadList();
}

async function refreshLoadList(){
  const body=document.getElementById('loadModalBody');
  body.innerHTML=`<div class="load-searching"><div class="load-spin"></div>Đang tìm file JSON...</div>`;

  const gh=detectGitHub();
  if(gh){
    await _loadListFromGitHub(gh,body);
    return;
  }

  // Fallback: local server (Python http.server) — parse directory listing HTML
  try{
    const res=await fetch('./data/',{cache:'no-cache'});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const html=await res.text();
    const doc2=new DOMParser().parseFromString(html,'text/html');
    const names=Array.from(doc2.querySelectorAll('a[href]'))
      .map(a=>a.getAttribute('href'))
      .filter(h=>h&&/\.json$/i.test(h)&&!h.startsWith('?')&&!h.startsWith('..'))
      .map(h=>decodeURIComponent(h.split('/').pop()));
    _renderLoadList(names,body);
  }catch(e){
    body.innerHTML=`<div class="load-error">
      ❌ <b>Không quét được thư mục data/</b><br>
      ${escHtml(e.message)}<br><br>
      <b>GitHub Pages:</b> đảm bảo repo public và có thư mục <code>data/</code>.<br>
      <b>Local:</b> chạy qua <code>python -m http.server</code>.
    </div>`;
  }
}

async function _loadListFromGitHub({owner,repo},body){
  // Tính subdir nếu là project page (username.github.io/repo-name/...)
  const parts=window.location.pathname.split('/').filter(Boolean);
  const subdir=parts.length>1 ? parts.slice(1,-1).join('/')+'/' : '';
  const apiUrl=`https://api.github.com/repos/${owner}/${repo}/contents/${subdir}data`;

  try{
    const res=await fetch(apiUrl,{headers:{'Accept':'application/vnd.github.v3+json'}});
    if(res.status===404){
      body.innerHTML=`<div class="load-error">
        ❌ Không tìm thấy thư mục <code>data/</code> trên repo <b>${owner}/${repo}</b>.<br>
        <span style="font-size:13px;color:var(--muted)">Tạo thư mục và đặt file JSON vào đó, sau đó push lên GitHub.</span>
      </div>`;return;
    }
    if(res.status===403){
      body.innerHTML=`<div class="load-error">⚠️ GitHub API rate limit. Vui lòng thử lại sau vài phút.</div>`;return;
    }
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const files=await res.json();
    const names=files.filter(f=>f.type==='file'&&/\.json$/i.test(f.name)).map(f=>f.name);
    _renderLoadList(names,body);
  }catch(e){
    body.innerHTML=`<div class="load-error">❌ Lỗi GitHub API: ${escHtml(e.message)}</div>`;
  }
}

let _loadFileNames=[];

function _renderLoadList(names,body){
  if(!names.length){
    body.innerHTML=`<div class="load-empty">
      <span class="load-empty-ico">📂</span>
      Không tìm thấy file <code>.json</code> nào<br>trong thư mục <code>data/</code>.
    </div>`;return;
  }
  _loadFileNames=names;
  const list=document.createElement('div');
  list.className='load-file-list';
  names.forEach((name,i)=>{
    const label=name.replace(/\.json$/i,'').replace(/[-_]/g,' ');
    const btn=document.createElement('button');
    btn.className='load-file-item';
    btn.innerHTML=`
      <span class="load-file-ico">📄</span>
      <span class="load-file-info">
        <span class="load-file-name">${escHtml(label)}</span>
        <span class="load-file-meta">${escHtml(name)}</span>
      </span>
      <span class="load-file-arrow">→</span>`;
    btn.onclick=()=>loadDataFile(_loadFileNames[i]);
    list.appendChild(btn);
  });
  body.innerHTML='';
  body.appendChild(list);
  const hint=document.createElement('div');
  hint.className='load-hint';
  hint.innerHTML=`${names.length} file · Nhấn để tải và thay thế dữ liệu hiện tại`;
  body.appendChild(hint);
}

async function loadDataFile(name){
  try{
    const resp=await fetch(`./data/${encodeURIComponent(name)}`,{cache:'no-cache'});
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const imp=await resp.json();
    if(!imp.folders||!Array.isArray(imp.folders)){
      toast('❌ File JSON không đúng định dạng','var(--danger)');return;
    }
    D=imp;selF=selA=null;open=new Set();showEd(false);
    D.folders.forEach(f=>open.add(f.id));
    render();saveToLS();
    const totalArts=D.folders.reduce((s,f)=>s+(f.articles?f.articles.length:0),0);
    const label=name.replace(/\.json$/i,'').replace(/[-_]/g,' ');
    closeLoadModal();
    toast(`✅ Đã tải "${label}" — ${D.folders.length} thư mục, ${totalArts} bài viết`,'var(--success)');
  }catch(err){
    toast('❌ Lỗi tải file: '+err.message,'var(--danger)');
  }
}

// ════════════════════ EDITOR EVENTS ════════════════════
const ta=document.getElementById('ta');
ta.addEventListener('input',scheduleAutoSave);
ta.addEventListener('keyup',updateToolbarState);
ta.addEventListener('mouseup',updateToolbarState);
ta.addEventListener('focus',updateToolbarState);
// Make Enter consistently create <p> blocks (Firefox can default to <br>,
// older Chrome to bare <div>) so line/paragraph spacing always has a block to target
ta.addEventListener('focus',()=>{try{document.execCommand('defaultParagraphSeparator','p')}catch(e){}});
// Prevent paste of rich content from outside — paste as plain+html
ta.addEventListener('paste',e=>{
  e.preventDefault();
  const text=(e.clipboardData.getData('text/plain')||'').trim();

  // Nếu paste đúng 1 URL ảnh → chèn <img>
  const imgUrlRe=/^https?:\/\/\S+\.(jpg|jpeg|jfif|png|gif|webp|svg|bmp|avif|ico)(\?[^\s]*)?$/i;
  if(imgUrlRe.test(text)){
    insertImageFromUrl(text);
    return;
  }

  // Nếu paste đúng 1 URL (không phải ảnh) → chèn <a href>
  const singleUrlRe=/^https?:\/\/[^\s]{4,}$/i;
  if(singleUrlRe.test(text)){
    const a=document.createElement('a');
    a.href=text;a.textContent=text;a.target='_blank';a.rel='noopener noreferrer';
    const sel=window.getSelection();
    let range;
    if(sel&&sel.rangeCount&&ta.contains(sel.getRangeAt(0).commonAncestorContainer)){
      range=sel.getRangeAt(0);
    } else {
      range=document.createRange();range.selectNodeContents(ta);range.collapse(false);
    }
    range.deleteContents();range.insertNode(a);
    range.setStartAfter(a);range.collapse(true);
    sel.removeAllRanges();sel.addRange(range);
    ta.focus();scheduleAutoSave();
    return;
  }

  // Text hỗn hợp hoặc nhiều dòng — tự động linkify URLs trong đó
  const urlInTextRe=/https?:\/\/[^\s<>"']+/gi;
  if(urlInTextRe.test(text)){
    // Build HTML: mỗi dòng thành <p>, URL trong dòng wrap thành <a>
    const html=text.split('\n').map(line=>{
      const escaped=line
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');
      const linked=escaped.replace(/https?:\/\/[^\s<>"'&]+/gi,url=>{
        // Decode lại & đã escape trong URL
        const rawUrl=url.replace(/&amp;/g,'&');
        return `<a href="${rawUrl}" target="_blank" rel="noopener noreferrer">${url}</a>`;
      });
      return `<p>${linked||'<br>'}</p>`;
    }).join('');
    document.execCommand('insertHTML',false,html);
    scheduleAutoSave();
    return;
  }

  // Không có URL — paste thường
  const html=e.clipboardData.getData('text/html');
  document.execCommand('insertHTML',false,html||text.replace(/\n/g,'<br>'));
  scheduleAutoSave();
});

// ════════════════════ INSERT IMAGE FROM URL ════════════════════
function insertImageFromUrl(url){
  const img=document.createElement('img');
  img.src=url;
  img.alt='';
  img.style.maxWidth='100%';
  img.style.borderRadius='8px';
  const sel=window.getSelection();
  let range;
  if(sel&&sel.rangeCount&&ta.contains(sel.getRangeAt(0).commonAncestorContainer)){
    range=sel.getRangeAt(0);
  } else {
    range=document.createRange();
    range.selectNodeContents(ta);
    range.collapse(false);
  }
  range.deleteContents();
  range.insertNode(img);
  range.setStartAfter(img);range.collapse(true);
  sel.removeAllRanges();sel.addRange(range);
  ta.focus();
  scheduleAutoSave();
  toast('🖼️ Đã chèn ảnh từ đường link','var(--success)');
}
